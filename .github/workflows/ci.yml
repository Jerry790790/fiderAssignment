name: Fider CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  fider-automation:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      # Use v5 to match the Node 24 runner requirements
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node & Go
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Build Application (Task 2.1)
        run: |
          npm run build heroku-postbuild
          go build -v -o fider-app main.go

      - name: Run Tests (Task 2.2)
        # We use 'continue-on-error' if you just need to prove the script RUNS
        continue-on-error: true 
        run: |
          npm test -- --watchAll=false
          go test -v -coverprofile=coverage.out ./...

      - name: Build Docker (Task 2.3)
        run: |
          docker build -t fider-staging:latest .
