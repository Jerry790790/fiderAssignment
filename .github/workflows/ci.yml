name: Fider CI Pipeline

on: [push]

jobs:
  fider-automation:
    runs-on: ubuntu-latest
    # Add this section here:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # This will now run on Node 24 engine
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Your APP can still use Node 20, even if the RUNNER uses 24
